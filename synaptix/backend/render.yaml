services:
  - type: web
    name: synaptixsolution
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://synaptixsolution.vercel.app
      - key: API_BASE
        value: https://synaptixsolution.onrender.com